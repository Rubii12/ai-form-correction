<!-- templates/base.html -->
<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>{% block title %}AI Personal Trainer{% endblock %}</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <!-- style.css intentionally not loaded - all styles are per-template -->
    <link
        href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;0,900;1,700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0a0a0a;
            color: #f0f0f0;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        /* ── Site header ── */
        .site-header {
            position: sticky;
            top: 0;
            z-index: 100;
            height: 60px;
            background: rgba(10, 10, 10, 0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.07);
            display: flex;
            align-items: center;
        }

        .site-header .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 0 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand a {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 900;
            font-size: 20px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: #fff;
            text-decoration: none;
        }

        .brand a span {
            color: #e8001d;
        }

        .main-nav {
            display: flex;
            gap: 4px;
        }

        .main-nav a {
            color: #555;
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 8px 14px;
            border-radius: 6px;
            transition: color .2s, background .2s;
        }

        .main-nav a:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.06);
        }

        .main-nav a.active {
            color: #fff;
        }

        /* ── Main content ── */
        .site-main {
            display: block;
        }

        .site-main .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ── Footer ── */
        .site-footer {
            border-top: 1px solid rgba(255, 255, 255, 0.07);
            padding: 24px 32px;
            text-align: center;
            color: #333;
            font-size: 12px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        @media (max-width: 600px) {
            .site-header .container {
                padding: 0 16px;
            }

            .brand a {
                font-size: 16px;
            }

            .main-nav a {
                padding: 8px 10px;
                font-size: 11px;
            }
        }
    </style>
</head>

<body class="{% block body_class %}{% endblock %}">

    <header class="site-header">
        <div class="container">
            <h1 class="brand"><a href="{{ url_for('index') }}">AI <span>Trainer</span></a></h1>
            <nav class="main-nav">
                <a href="{{ url_for('workout') }}" {% if request.endpoint=='workout' %}class="active" {% endif
                    %}>Workout</a>
                <a href="{{ url_for('nutrition') }}" {% if request.endpoint=='nutrition' %}class="active" {% endif
                    %}>Nutrition</a>
                <a href="{{ url_for('progress') }}" {% if request.endpoint=='progress' %}class="active" {% endif
                    %}>Progress</a>
            </nav>
        </div>
    </header>

    <main class="site-main">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <small>© AI Trainer • Built with Flask & MediaPipe</small>
    </footer>

</body>

</html>
